modLoader = "javafml"
loaderVersion = "[1,)"
#issueTrackerURL = "A valid URL to your issue tracker where people can open bug tickets"
license = "All Rights Reserved"

[[mixins]]
config = "cobbledollars_villagers_overhaul_rca.mixins.json"

[[mods]]
modId = "cobbledollars_villagers_overhaul_rca"
version = "${version}"
displayName = "CobbleDollars Villagers Overhaul"
authors = "Streats1"
description = '''
Integrates CobbleDollars with villager trading system
'''
#logoFile = ""

[[dependencies.cobbledollars_villagers_overhaul_rca]]
modId = "minecraft"
mandatory = true
versionRange = "[1.21.1]"
ordering = "NONE"
side = "BOTH"

[[dependencies.cobbledollars_villagers_overhaul_rca]]
modId = "neoforge"
mandatory = true
versionRange = "[21.1.182,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.cobbledollars_villagers_overhaul_rca]]
modId = "cobblemon"
mandatory = true
versionRange = "[1.7.1,)"
ordering = "AFTER"
side = "BOTH"

# Optional: CobbleDollars. When present, Bank button and custom currency bank injection work.
[[dependencies.cobbledollars_villagers_overhaul_rca]]
modId = "cobbledollars"
type = "optional"
versionRange = "*"
ordering = "NONE"
side = "BOTH"

# Optional: Easy Villagers. This mod has its own trade cycle implementation; Easy Villagers is not required.
[[dependencies.cobbledollars_villagers_overhaul_rca]]
modId = "easy_villagers"
type = "optional"
versionRange = "*"
ordering = "NONE"
side = "BOTH"

# Optional: VillagerConfig — datapack villager trades; we call updateTrades before reading offers when the list is empty.
[[dependencies.cobbledollars_villagers_overhaul_rca]]
modId = "villagerconfig"
type = "optional"
versionRange = "*"
ordering = "NONE"
side = "BOTH"

# Optional: Minecraft Comes Alive — interaction GUI on right-click; CobbleDollars shop on Trade/shift-trade.
[[dependencies.cobbledollars_villagers_overhaul_rca]]
modId = "mca"
type = "optional"
versionRange = "*"
ordering = "NONE"
side = "BOTH"

# Optional: MCA Cobblemon — Pokémon dialogue on MCA villagers; trading still uses CobbleDollars shop.
[[dependencies.cobbledollars_villagers_overhaul_rca]]
modId = "mca_cobblemon"
type = "optional"
versionRange = "*"
ordering = "NONE"
side = "BOTH"
